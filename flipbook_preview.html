<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The New Economy - Interactive Magazine</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-dark: #a68b3d;
      --black: #080c14;
      --grey: #8a8a8a;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Ambient Background */
    .bg-gradient {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1a2233 0%, #080c14 100%);
      z-index: -1;
    }

    /* Loader */
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      z-index: 10;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(201,168,76,0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loader p {
      color: var(--gold);
      letter-spacing: 0.1em;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    /* Flipbook Engine Styles */
    .flipbook-viewport {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      cursor: grab;
      padding: 4rem 2rem 8rem;
    }

    .flipbook-container {
      box-shadow: 0 40px 80px rgba(0,0,0,0.7);
      transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform-origin: center center;
      max-height: 82vh;
    }

    .page {
      background-color: #fff;
      overflow: hidden;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* Controls HUD */
    .magazine-controls {
      position: fixed;
      bottom: 2rem;
      display: flex;
      gap: 0.8rem;
      align-items: center;
      background: rgba(8, 12, 20, 0.9);
      backdrop-filter: blur(15px);
      padding: 0.8rem 1.5rem;
      border-radius: 100px;
      border: 1px solid rgba(201,168,76,0.3);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      z-index: 100;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .magazine-controls.active {
      opacity: 1;
      transform: translateY(0);
    }

    .magazine-controls button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--white);
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .magazine-controls button:hover {
      color: var(--gold);
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }

    .v-line {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      margin: 0 0.2rem;
    }

    .zoom-indicator {
      color: var(--gold);
      font-size: 0.8rem;
      font-weight: 700;
      min-width: 50px;
      text-align: center;
    }

    /* Fullscreen UI */
    .fs-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(8, 12, 20, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--white);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 101;
    }

    /* Mobile Adaptations */
    @media (max-width: 768px) {
      .magazine-controls {
        bottom: 1rem;
        padding: 0.5rem 1rem;
        gap: 0.5rem;
      }
      .magazine-controls button {
        padding: 0.5rem 0.8rem;
        font-size: 0.6rem;
      }
      .zoom-indicator { font-size: 0.7rem; min-width: 40px; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <div id="loader">
    <div class="spinner"></div>
    <p id="load-status">Preparing Presentation...</p>
    <p id="load-percent" style="font-size: 0.8rem; margin-top: -0.5rem; opacity: 0.7;">0%</p>
  </div>

  <div class="fs-toggle" onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</div>

  <div class="flipbook-viewport" id="viewport" style="display: none;">
    <div id="flipbook" class="flipbook-container">
      <!-- Pages Injected Here -->
    </div>
  </div>

  <div class="magazine-controls" id="controls">
    <button onclick="if(magazine) magazine.flipPrev()">Prev</button>
    <span id="page-num" style="color: var(--white); font-size: 0.8rem; font-weight: 700;">1 / 1</span>
    <button onclick="if(magazine) magazine.flipNext()">Next</button>
    
    <div class="v-line"></div>
    
    <button onclick="changeZoom(-0.25)">−</button>
    <span class="zoom-indicator" id="zoom-val">100%</span>
    <button onclick="changeZoom(0.25)">+</button>
    <button onclick="resetZoom()" style="font-size: 0.6rem">Reset</button>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  
  <script>
    const FILE_PATHS = [
      'The New Economy Full_compressed.pdf',
      'The New Economy Compressed.pdf',
      'The New Economy Full.pdf'
    ];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let magazine = null;
    let currentZoom = 1;
    let pdfDoc = null;

    const viewport = document.getElementById('viewport');
    const container = document.getElementById('flipbook');
    const controls = document.getElementById('controls');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('load-status');
    const percentText = document.getElementById('load-percent');
    const zoomText = document.getElementById('zoom-val');
    const pageText = document.getElementById('page-num');

    async function init() {
      try {
        statusText.innerText = "Searching for optimized assets...";
        
        // Smart loading: Try Compressed first for mobile speed, then Full
        for (const path of FILE_PATHS) {
          try {
            const loadingTask = pdfjsLib.getDocument(path);
            loadingTask.onProgress = (p) => {
              if (p.total > 0) {
                const pct = Math.round((p.loaded / p.total) * 100);
                percentText.innerText = pct + "%";
                statusText.innerText = path.includes('Compressed') 
                  ? "Loading Optimized Version..." 
                  : "Loading High-Resolution Master...";
              }
            };
            pdfDoc = await loadingTask.promise;
            console.log(`Successfully loaded: ${path}`);
            break; 
          } catch (e) {
            console.warn(`Could not load ${path}, trying next...`);
          }
        }

        if (!pdfDoc) throw new Error("No PDF files found.");
        const numPages = pdfDoc.numPages;
        statusText.innerText = `Rethinking ${numPages} Pages...`;

        // Render Pages
        for (let i = 1; i <= numPages; i++) {
          const page = await pdfDoc.getPage(i);
          // HD RESOLUTION (2.5x)
          const scale = 2.5;
          const vp = page.getViewport({ scale });
          
          const canvas = document.createElement('canvas');
          canvas.width = vp.width;
          canvas.height = vp.height;
          
          const ctx = canvas.getContext('2d');
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          
          await page.render({ canvasContext: ctx, viewport: vp }).promise;
          
          const pageDiv = document.createElement('div');
          pageDiv.className = 'page';
          pageDiv.appendChild(canvas);
          container.appendChild(pageDiv);
          
          percentText.innerText = Math.round((i / numPages) * 100) + "%";
        }

        // Initialize Flipbook
        magazine = new St.PageFlip(container, {
          width: 600,
          height: 800,
          size: "stretch",
          minWidth: 300,
          maxWidth: 1000,
          minHeight: 400,
          maxHeight: 1200,
          showCover: true,
          mobileScrollSupport: true,
          useMouseEvents: true,
          swipeDistance: 30
        });

        magazine.loadFromHTML(document.querySelectorAll('.page'));
        
        magazine.on('flip', (e) => {
          pageText.innerText = `${e.data + 1} / ${numPages}`;
          if (currentZoom > 1.05) resetZoom();
        });

        pageText.innerText = `1 / ${numPages}`;

        // Cleanup and Show
        loader.style.display = 'none';
        viewport.style.display = 'flex';
        controls.classList.add('active');

        setupInteractions();

      } catch (err) {
        console.error(err);
        statusText.innerText = "Error: Please ensure the PDF is in the same folder.";
        statusText.style.color = "#ff4d4d";
      }
    }

    function setupInteractions() {
      // Pinch to Zoom
      const mc = new Hammer.Manager(viewport);
      mc.add(new Hammer.Pinch());
      
      let startScale = 1;
      mc.on("pinchstart", () => { startScale = currentZoom; });
      mc.on("pinchmove", (e) => {
        currentZoom = Math.min(Math.max(startScale * e.scale, 1), 3);
        updateZoom();
      });

      // Mouse Wheel Zoom
      viewport.addEventListener('wheel', (e) => {
        if (e.ctrlKey) {
          e.preventDefault();
          changeZoom(e.deltaY > 0 ? -0.1 : 0.1);
        }
      }, { passive: false });
    }

    function updateZoom() {
      container.style.transform = `scale(${currentZoom})`;
      zoomText.innerText = Math.round(currentZoom * 100) + "%";
      
      if (currentZoom > 1.05) {
        magazine.updateConfig({ mobileScrollSupport: false });
        viewport.style.cursor = 'move';
      } else {
        magazine.updateConfig({ mobileScrollSupport: true });
        viewport.style.cursor = 'grab';
      }
    }

    function changeZoom(delta) {
      currentZoom = Math.min(Math.max(currentZoom + delta, 1), 3);
      updateZoom();
    }

    function resetZoom() {
      currentZoom = 1;
      updateZoom();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          alert(`Error attempting to enable fullscreen: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    // Double-tap zoom for mobile
    let lastTap = 0;
    viewport.addEventListener('touchend', (e) => {
      const currentTime = new Date().getTime();
      const tapLength = currentTime - lastTap;
      if (tapLength < 300 && tapLength > 0) {
        e.preventDefault();
        currentZoom > 1.1 ? resetZoom() : changeZoom(1);
      }
      lastTap = currentTime;
    });

    window.onload = init;
  </script>
</body>
</html>
